spring.application.name=delivery.request

recipients.service.url=http://localhost:8081

server.port=8082

spring.datasource.url=jdbc:mysql://localhost:3306/delivery
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

#kafka
spring.kafka.bootstrap-servers=localhost:9092
kafka.topic.request-status=request-status-changed
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=delivery-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

#kafka retry
spring.kafka.producer.retries=3
spring.kafka.producer.acks=all
spring.kafka.producer.delivery-timeout-ms=5000
spring.kafka.producer.properties.request.timeout.ms=3000
spring.kafka.producer.properties.retry.backoff.ms=1000